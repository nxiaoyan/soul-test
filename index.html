body {

  padding: 20px;

  color: #888;
  font-size: 0.85em;
  line-height: 1.6;

  function $(id) { return document.getElementById(id); }

  function startTest() {
    $('start-screen').classList.add('hidden');
    $('quiz-screen').classList.remove('hidden');
    showQuestion();
  }

  function goBack() {
    if (currentQ <= 0 || isAnimating) return;
    isAnimating = true;
    var last = history.pop();
    // 减去上一题的分数
    scores[0] -= last.scores[0];
    scores[1] -= last.scores[1];
    scores[2] -= last.scores[2];
    scores[3] -= last.scores[3];
    currentQ--;
    setTimeout(function() {
      isAnimating = false;
      showQuestion();
    }, 100);
  }

  function showQuestion() {
    var q = questions[currentQ];
    var area = $('question-area');
    $('progress').style.width = ((currentQ / questions.length) * 100) + '%';

    area.innerHTML = '';

    // 返回按钮（第一题不显示）
    if (currentQ > 0) {
      var backBtn = document.createElement('button');
      backBtn.className = 'back-btn';
      backBtn.innerHTML = '\u2190 \u4e0a\u4e00\u9898';
      backBtn.addEventListener('click', function(e) { e.preventDefault(); goBack(); });
      backBtn.addEventListener('touchend', function(e) { e.preventDefault(); goBack(); });
      area.appendChild(backBtn);
    }

    var card = document.createElement('div');
    card.className = 'question-card';
    card.innerHTML = '<div class="q-number">\u95ee\u9898 ' + (currentQ + 1) + ' / ' + questions.length + '</div>' +
      '<div class="q-text">' + q.text + '</div>' +
      '<div class="options" id="opts"></div>';
    area.appendChild(card);

    var optsDiv = card.querySelector('#opts');
    q.options.forEach(function(opt, i) {
      var div = document.createElement('div');
      div.className = 'option';
      div.textContent = opt.text;
      div.setAttribute('data-idx', i);
      div.addEventListener('click', function(e) {
        e.preventDefault();
        e.stopPropagation();
        if (isAnimating) return;
        selectOption(i, div);
      });
      div.addEventListener('touchend', function(e) {
        e.preventDefault();
        e.stopPropagation();
        if (isAnimating) return;
        selectOption(i, div);
      });
      optsDiv.appendChild(div);
    });

    isAnimating = false;
  }

  function selectOption(idx, el) {
    if (isAnimating) return;
    isAnimating = true;

    if (el) el.classList.add('tapped');

    var q = questions[currentQ];
    var s = q.options[idx].scores;
    scores[0] += s[0];
    scores[1] += s[1];
    scores[2] += s[2];
    scores[3] += s[3];

    // 记录到历史
    history.push({ qIdx: currentQ, optIdx: idx, scores: s });
    currentQ++;

    setTimeout(function() {
      if (currentQ >= questions.length) {
        showResult();
      } else {
        showQuestion();
